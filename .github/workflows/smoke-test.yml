name: Smoke test pós-deploy

# Dispara em deployment_status — evento que o app do Vercel no GitHub emite
# quando um deploy muda de estado. Roda só quando o deploy de PRODUÇÃO
# termina com sucesso.
#
# Usa o domínio público fixo (saudeagora.vercel.app), não
# deployment_status.target_url: a URL específica de cada deploy
# (ex: saudeagora-xxxxx-ft-oledo.vercel.app) fica atrás da autenticação do
# próprio Vercel (SSO da equipe) e nunca chega a mostrar o app de verdade
# pra um runner sem sessão — confirmado ao vivo nesta investigação (a URL
# de deploy individual redireciona pra tela de login do Vercel, não pro
# SaúdeAgora). O domínio público é o que qualquer usuário real acessa,
# então é o que precisa ser testado.
on:
  deployment_status:

jobs:
  smoke:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Rodar smoke test contra o deploy
        env:
          SMOKE_BASE_URL: https://saudeagora.vercel.app
          SMOKE_CLIENTE_EMAIL: ${{ secrets.SMOKE_CLIENTE_EMAIL }}
          SMOKE_CLIENTE_SENHA: ${{ secrets.SMOKE_CLIENTE_SENHA }}
          SMOKE_PROFISSIONAL_EMAIL: ${{ secrets.SMOKE_PROFISSIONAL_EMAIL }}
          SMOKE_PROFISSIONAL_SENHA: ${{ secrets.SMOKE_PROFISSIONAL_SENHA }}
        run: npm run test:smoke

      - name: Guardar relatório em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
